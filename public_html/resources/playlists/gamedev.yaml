# Responsive Bootstrap 5.3.8 grid configuration
# Note: Individual sections have their own responsive columns config above
# This grid_config provides defaults for any sections without specific column settings
grid_config:
  columns:
    xs: 1    # 1 column on mobile (iPhone 390px, etc.)
    sm: 2    # 2 columns on small tablets
    md: 3    # 3 columns on medium screens
    lg: 3    # 3 columns on large desktops
  videos_per_playlist: 1  # Show 1 video per playlist card
  enable_hover_effects: true
  enable_lazy_loading: true
  show_single_video: true  # Show single video card format (not tall vertical)
  layout: "single-card"
  aspect_ratio: "16:9"
  lazy_load: true
  responsive: true

