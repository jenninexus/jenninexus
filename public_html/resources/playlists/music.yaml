# Responsive Bootstrap 5.3.8 grid configuration
grid_config:
  columns:
    xs: 1    # 1 column on mobile (iPhone 390px, etc.)
    sm: 2    # 2 columns on small tablets
    md: 3    # 3 columns on medium screens
    lg: 5    # 5 columns on large desktops (custom .col-lg-2-4)
  videos_per_playlist: 6
  show_single_video: false
  layout: "multi-video"
  enable_hover_effects: true
  aspect_ratio: "16:9"
  lazy_load: true
  responsive: true
