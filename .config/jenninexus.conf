# JenniNexus Nginx Configuration
# Bootstrap 5.3.8 site with PHP includes
# 
# DEVELOPMENT:
#   • Local port: 8002 (designated JenniNexus dev port)
#   • Run: .\scripts\dev-server.ps1
#   • URL: http://localhost:8002
#
# PRODUCTION:
#   • Server IP: 64.23.141.41 ✅ VERIFIED
#   • SSH Alias: jennidrop-root ✅ VERIFIED
#   • Domain: jenninexus.com (DNS configured)
#   • PHP: 8.3-fpm ✅ VERIFIED
#   • Web Root: /var/www/jenninexus ✅ VERIFIED
#   • Place in: /etc/nginx/sites-available/jenninexus.conf
#   • Symlink: ln -s /etc/nginx/sites-available/jenninexus.conf /etc/nginx/sites-enabled/
#   • Test: sudo nginx -t
#   • Reload: sudo systemctl reload nginx
#
# DEPLOYMENT:
#   1. Build locally: .\scripts\build.ps1
#   2. Upload contents to: /var/www/jenninexus/
#   3. Set permissions: sudo chown -R www-data:www-data /var/www/jenninexus
#   4. Reload services: sudo systemctl reload nginx && sudo systemctl reload php8.3-fpm

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name jenninexus.com www.jenninexus.com;
    return 301 https://jenninexus.com$request_uri;
}

# HTTPS www to non-www redirect
server {
    listen 443 ssl;
    http2 on;
    server_name www.jenninexus.com;
    
    ssl_certificate /etc/letsencrypt/live/jenninexus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenninexus.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    return 301 https://jenninexus.com$request_uri;
}

# Main HTTPS jenninexus.com server
server {
    listen 443 ssl;
    http2 on;
    server_name jenninexus.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/jenninexus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenninexus.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Document root (point to public_html where the PHP pages live)
    root /var/www/jenninexus/public_html;
    index index.php index.html;

    # Serve files; support extensionless PHP by trying $uri.php
    # Example: /gamedev  -> will serve gamedev.php if present
    # Example: /game/gamejams -> will serve game/gamejams.php
    # Example: /blog/voice-acting-in-games -> will serve blog/voice-acting-in-games.php
    # Example: /jennistyles -> will serve game/jennistyles.php (if not found at root)
    location / {
        # Try exact file, then directory, then PHP variant, then check /game/ and /blog/ subdirectories
        try_files $uri $uri/ $uri.php?$args /game$uri.php?$args /blog$uri.php?$args @notfound;
    }
    
    # Handle 404 gracefully
    location @notfound {
        return 404;
    }

    # Deny direct access to PHP files under sensitive directories
    location ~ ^/(storage|scripts|vendor|node_modules)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # PHP Processing (FastCGI) - rely on distribution snippet for correct params
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }
    
    # Special handling for /resources directory (assets, playlists, etc.)
    location /resources/ {
        # Allow direct access to resources
        try_files $uri $uri/ =404;
        
        # Enable MIME type detection for videos
        include mime.types;
        types {
            video/mp4 mp4;
            video/webm webm;
        }
    }
    
    # Asset caching - 1 year for immutable assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf|yaml|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Video caching - 30 days (may update more frequently)
    location ~* \.(mp4|webm|ogg|avi|mov)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    
    # Security - Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security - Block access to source directories
    location ~ /(src|storage|scripts|vendor|node_modules)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security - Block access to sensitive files
    location ~ \.(env|log|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/jenninexus.access.log;
    error_log /var/log/nginx/jenninexus.error.log;
}

